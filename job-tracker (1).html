<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求职追踪器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --gray: #6b7280;
    --text: #e8eaf0;
    --text2: #9aa3b2;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a1f32 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .logo span {
    font-size: 13px;
    color: var(--text2);
    font-weight: 400;
    display: block;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 20px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    min-width: 130px;
    text-align: center;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text2);
  }

  /* Main content */
  .main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 38px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray);
    font-size: 15px;
    pointer-events: none;
  }

  select, .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus, .filter-btn:focus { border-color: var(--accent); }

  /* Buttons */
  .btn {
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #3b6fd4);
    color: #fff;
    box-shadow: 0 2px 12px rgba(79,142,247,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 18px rgba(79,142,247,0.4);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    border: 1px solid transparent;
    color: var(--red);
    padding: 6px 10px;
    font-size: 13px;
  }

  .btn-danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); }

  .btn-edit {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    padding: 6px 10px;
    font-size: 13px;
  }

  .btn-edit:hover { background: var(--surface2); color: var(--accent); }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 14px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }

  th:hover { color: var(--accent); }

  th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 11px; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: rowIn 0.25s ease forwards;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(79,142,247,0.04); }

  td {
    padding: 14px 16px;
    font-size: 14px;
    vertical-align: middle;
  }

  .company-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .company-avatar {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }

  .company-name {
    font-weight: 600;
    font-size: 14px;
  }

  .company-city {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .badge-pending { background: rgba(245,158,11,0.12); color: var(--yellow); }
  .badge-interview { background: rgba(79,142,247,0.12); color: var(--accent); }
  .badge-offer { background: rgba(34,197,94,0.12); color: var(--green); }
  .badge-rejected { background: rgba(239,68,68,0.1); color: var(--red); }
  .badge-ghosted { background: rgba(107,114,128,0.12); color: var(--gray); }
  .badge-test { background: rgba(124,58,237,0.12); color: #a78bfa; }

  .reply-text {
    font-size: 13px;
    color: var(--text2);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  .reply-text.has-reply { color: var(--text); }

  .date-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text2);
  }

  .actions { display: flex; gap: 4px; align-items: center; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text2);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 15px; margin-bottom: 8px; }
  .empty-state small { font-size: 13px; color: var(--gray); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    animation: modalIn 0.22s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(-10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title { font-size: 18px; font-weight: 700; }

  .modal-close {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  input[type="text"],
  input[type="date"],
  input[type="url"],
  textarea,
  select.form-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus,
  input[type="date"]:focus,
  input[type="url"]:focus,
  textarea:focus,
  select.form-select:focus { border-color: var(--accent); }

  textarea { resize: vertical; min-height: 80px; }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* Reply modal */
  .reply-modal .modal { max-width: 460px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .platform-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .no-reply { font-style: italic; }

  /* Person switcher */
  .person-switcher {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px;
  }

  .person-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: none;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .person-btn.active {
    background: linear-gradient(135deg, var(--accent), #3b6fd4);
    color: #fff;
    box-shadow: 0 2px 8px rgba(79,142,247,0.35);
  }

  .person-btn:not(.active):hover { color: var(--text); }

  .current-person-tag {
    font-size: 12px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  @media (max-width: 600px) {
    header, .stats-bar, .main { padding-left: 16px; padding-right: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .person-switcher { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div>
      <h1>求职追踪</h1>
      <span>Job Application Tracker</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="person-switcher" id="personSwitcher"></div>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 添加投递</button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <!-- filled by JS -->
</div>

<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索公司名、职位…" oninput="renderTable()">
    </div>
    <select id="statusFilter" onchange="renderTable()">
      <option value="">全部状态</option>
      <option value="pending">待回复</option>
      <option value="interview">面试中</option>
      <option value="test">笔试/测试</option>
      <option value="offer">已 Offer</option>
      <option value="rejected">已拒绝</option>
      <option value="ghosted">已失联</option>
    </select>
    <select id="sortField" onchange="renderTable()">
      <option value="date">按投递日期</option>
      <option value="company">按公司名</option>
      <option value="status">按状态</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>公司 / 职位</th>
          <th>投递人</th>
          <th>平台</th>
          <th>投递日期</th>
          <th>状态</th>
          <th>回复内容</th>
          <th>最后更新</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">📭</div>
      <p>还没有投递记录</p>
      <small>点击右上角「添加投递」开始记录你的求职旅程</small>
    </div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">添加投递记录</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>公司名称 *</label>
        <input type="text" id="f_company" placeholder="字节跳动">
      </div>
      <div class="form-group">
        <label>应聘职位 *</label>
        <input type="text" id="f_role" placeholder="前端开发工程师">
      </div>
      <div class="form-group">
        <label>城市</label>
        <input type="text" id="f_city" placeholder="北京">
      </div>
      <div class="form-group">
        <label>投递平台</label>
        <input type="text" id="f_platform" placeholder="Boss直聘 / 拉勾 / 官网…">
      </div>
      <div class="form-group">
        <label>投递日期</label>
        <input type="date" id="f_date">
      </div>
      <div class="form-group">
        <label>当前状态</label>
        <select class="form-select" id="f_status">
          <option value="pending">待回复</option>
          <option value="interview">面试中</option>
          <option value="test">笔试/测试</option>
          <option value="offer">已 Offer</option>
          <option value="rejected">已拒绝</option>
          <option value="ghosted">已失联</option>
        </select>
      </div>
      <div class="form-group full">
        <label>JD 链接</label>
        <input type="url" id="f_url" placeholder="https://...">
      </div>
      <div class="form-group full">
        <label>回复 / 备注</label>
        <textarea id="f_reply" placeholder="例如：已约一面，时间 4月1日下午 / 笔试通知…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">取消</button>
      <button class="btn btn-primary" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

<!-- Reply Modal -->
<div class="modal-overlay reply-modal" id="replyModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="replyModalTitle">更新回复</div>
      <button class="modal-close" onclick="closeModal('replyModal')">×</button>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>当前状态</label>
      <select class="form-select" id="r_status"></select>
    </div>
    <div class="form-group">
      <label>回复 / 备注内容</label>
      <textarea id="r_reply" placeholder="记录 HR 回复、面试安排、备注等…" style="min-height:120px"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal('replyModal')">取消</button>
      <button class="btn btn-primary" onclick="saveReply()">更新</button>
    </div>
  </div>
</div>

<script>
// ---- Supabase config ----
const SUPABASE_URL = 'https://nrjacjbzsrhjxuvqstxm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fKFhOhrsDtmmn_5iQjqdmQ_XHu912WO';

async function sbFetch(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === 'GET' || method === 'POST') return res.json();
  return res;
}

async function dbLoad(person) {
  return await sbFetch('GET', `applications?person=eq.${encodeURIComponent(person)}&order=date.desc`);
}

async function dbInsert(record) {
  return await sbFetch('POST', 'applications', record);
}

async function dbUpdate(id, fields) {
  return await sbFetch('PATCH', `applications?id=eq.${id}`, fields);
}

async function dbDelete(id) {
  return await sbFetch('DELETE', `applications?id=eq.${id}`);
}

// ---- App ----
const STATUS_MAP = {
  pending:   { label: '待回复',   cls: 'badge-pending' },
  interview: { label: '面试中',   cls: 'badge-interview' },
  test:      { label: '笔试/测试', cls: 'badge-test' },
  offer:     { label: '已 Offer', cls: 'badge-offer' },
  rejected:  { label: '已拒绝',  cls: 'badge-rejected' },
  ghosted:   { label: '已失联',  cls: 'badge-ghosted' },
};

const COLORS = ['#4f8ef7','#7c3aed','#059669','#dc2626','#ea580c','#0891b2','#be185d','#65a30d'];

// ---- People config ----
const PEOPLE = ['李', '刘'];
const PERSON_COLORS = { '李': '#4f8ef7', '刘': '#f59e0b' };

let currentPerson = localStorage.getItem('current_person') || PEOPLE[0];
let records = [];
let editingId = null;
let replyingId = null;
let loading = false;

function setLoading(on) {
  loading = on;
  document.getElementById('tableBody').style.opacity = on ? '0.4' : '1';
}

async function switchPerson(p) {
  currentPerson = p;
  localStorage.setItem('current_person', p);
  renderPersonSwitcher();
  await loadRecords();
}

async function loadRecords() {
  setLoading(true);
  try {
    records = await dbLoad(currentPerson);
    if (!Array.isArray(records)) records = [];
  } catch(e) {
    records = [];
    showToast('加载失败，请检查网络', true);
  }
  setLoading(false);
  render();
}

function renderPersonSwitcher() {
  document.getElementById('personSwitcher').innerHTML = PEOPLE.map(p =>
    `<button class="person-btn ${p === currentPerson ? 'active' : ''}" onclick="switchPerson('${p}')">${p}</button>`
  ).join('');
}

function colorFor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}

function today() { return new Date().toISOString().slice(0, 10); }

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${m}-${day}`;
}

function timeAgo(d) {
  if (!d) return '';
  const diff = Math.floor((Date.now() - new Date(d)) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff < 30) return `${diff}天前`;
  return fmtDate(d.slice(0,10));
}

function showToast(msg, err) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:8px;font-size:14px;font-family:inherit;z-index:9999;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = err ? '#ef4444' : '#22c55e';
  t.style.color = '#fff';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2200);
}

// Stats
function renderStats() {
  const total = records.length;
  const counts = {};
  for (const k of Object.keys(STATUS_MAP)) counts[k] = 0;
  for (const r of records) counts[r.status] = (counts[r.status] || 0) + 1;

  const pc = PERSON_COLORS[currentPerson] || '#4f8ef7';
  const items = [
    { label: `${currentPerson} 的投递`, num: total, color: pc },
    { label: '待回复', num: counts.pending, color: '#f59e0b' },
    { label: '面试中', num: counts.interview, color: '#4f8ef7' },
    { label: '已 Offer', num: counts.offer, color: '#22c55e' },
    { label: '已拒绝', num: counts.rejected, color: '#ef4444' },
    { label: '笔试', num: counts.test, color: '#a78bfa' },
  ];

  document.getElementById('statsBar').innerHTML = items.map(i =>
    `<div class="stat-card">
      <div class="stat-num" style="color:${i.color}">${i.num}</div>
      <div class="stat-label">${i.label}</div>
    </div>`
  ).join('');
}

// Table
function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sf = document.getElementById('statusFilter').value;
  const sort = document.getElementById('sortField').value;

  let data = records.filter(r => {
    const match = !q || (r.company||'').toLowerCase().includes(q) || (r.role||'').toLowerCase().includes(q);
    const st = !sf || r.status === sf;
    return match && st;
  });

  data.sort((a, b) => {
    if (sort === 'company') return (a.company||'').localeCompare(b.company||'', 'zh');
    if (sort === 'status') return (a.status||'').localeCompare(b.status||'');
    return (b.date || '').localeCompare(a.date || '');
  });

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');

  if (loading) { empty.style.display = 'none'; return; }

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  const pc = PERSON_COLORS[currentPerson] || '#4f8ef7';
  tbody.innerHTML = data.map(r => {
    const s = STATUS_MAP[r.status] || STATUS_MAP.pending;
    const av = (r.company||'?').slice(0, 2);
    const col = colorFor(r.company||'');
    const replyPreview = r.reply ? `<span class="reply-text has-reply" title="${r.reply}">${r.reply}</span>` : `<span class="reply-text no-reply" style="opacity:0.4">暂无回复</span>`;
    const jdLink = r.url ? `<a href="${r.url}" target="_blank" style="color:var(--accent);font-size:12px;text-decoration:none;" title="查看 JD">🔗</a>` : '';

    return `<tr>
      <td>
        <div class="company-cell">
          <div class="company-avatar" style="background:${col}">${av}</div>
          <div>
            <div class="company-name">${r.company} ${jdLink}</div>
            <div class="company-city">${r.role}${r.city ? ' · ' + r.city : ''}</div>
          </div>
        </div>
      </td>
      <td><span class="current-person-tag" style="border-color:${pc};color:${pc}">${r.person||currentPerson}</span></td>
      <td>${r.platform ? `<span class="platform-tag">${r.platform}</span>` : '<span style="color:var(--gray);font-size:13px">—</span>'}</td>
      <td><span class="date-text">${fmtDate(r.date)}</span></td>
      <td><span class="badge ${s.cls}">${s.label}</span></td>
      <td>${replyPreview}</td>
      <td><span class="date-text" style="font-size:12px">${timeAgo(r.updated_at)}</span></td>
      <td>
        <div class="actions">
          <button class="btn btn-edit" onclick="openReplyModal('${r.id}')" title="更新回复">💬</button>
          <button class="btn btn-edit" onclick="openEditModal('${r.id}')" title="编辑">✏️</button>
          <button class="btn btn-danger" onclick="deleteRecord('${r.id}')" title="删除">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function render() { renderStats(); renderTable(); }

// Add / Edit Modal
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = `添加投递记录 — ${currentPerson}`;
  document.getElementById('f_company').value = '';
  document.getElementById('f_role').value = '';
  document.getElementById('f_city').value = '';
  document.getElementById('f_platform').value = '';
  document.getElementById('f_date').value = today();
  document.getElementById('f_status').value = 'pending';
  document.getElementById('f_url').value = '';
  document.getElementById('f_reply').value = '';
  document.getElementById('addModal').classList.add('open');
}

function openEditModal(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '编辑记录';
  document.getElementById('f_company').value = r.company||'';
  document.getElementById('f_role').value = r.role||'';
  document.getElementById('f_city').value = r.city||'';
  document.getElementById('f_platform').value = r.platform||'';
  document.getElementById('f_date').value = r.date||'';
  document.getElementById('f_status').value = r.status||'pending';
  document.getElementById('f_url').value = r.url||'';
  document.getElementById('f_reply').value = r.reply||'';
  document.getElementById('addModal').classList.add('open');
}

async function saveRecord() {
  const company = document.getElementById('f_company').value.trim();
  const role = document.getElementById('f_role').value.trim();
  if (!company || !role) { alert('公司名称和职位为必填项'); return; }

  const now = new Date().toISOString();
  const fields = {
    company, role,
    city: document.getElementById('f_city').value.trim(),
    platform: document.getElementById('f_platform').value.trim(),
    date: document.getElementById('f_date').value,
    status: document.getElementById('f_status').value,
    url: document.getElementById('f_url').value.trim(),
    reply: document.getElementById('f_reply').value.trim(),
    updated_at: now,
  };

  closeModal('addModal');
  setLoading(true);
  try {
    if (editingId) {
      await dbUpdate(editingId, fields);
    } else {
      await dbInsert({ ...fields, id: Date.now().toString(), person: currentPerson, created_at: now });
    }
    showToast(editingId ? '已更新 ✓' : '已添加 ✓');
    await loadRecords();
  } catch(e) {
    showToast('保存失败', true);
    setLoading(false);
  }
}

// Reply Modal
function openReplyModal(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  replyingId = id;
  document.getElementById('replyModalTitle').textContent = `更新回复 — ${r.company}`;

  const sel = document.getElementById('r_status');
  sel.innerHTML = Object.entries(STATUS_MAP).map(([k, v]) =>
    `<option value="${k}" ${r.status === k ? 'selected' : ''}>${v.label}</option>`
  ).join('');

  document.getElementById('r_reply').value = r.reply || '';
  document.getElementById('replyModal').classList.add('open');
}

async function saveReply() {
  const fields = {
    status: document.getElementById('r_status').value,
    reply: document.getElementById('r_reply').value.trim(),
    updated_at: new Date().toISOString(),
  };
  closeModal('replyModal');
  setLoading(true);
  try {
    await dbUpdate(replyingId, fields);
    showToast('已更新 ✓');
    await loadRecords();
  } catch(e) {
    showToast('更新失败', true);
    setLoading(false);
  }
}

async function deleteRecord(id) {
  if (!confirm('确认删除这条记录？')) return;
  setLoading(true);
  try {
    await dbDelete(id);
    showToast('已删除');
    await loadRecords();
  } catch(e) {
    showToast('删除失败', true);
    setLoading(false);
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// Init
renderPersonSwitcher();
loadRecords();
</script>
